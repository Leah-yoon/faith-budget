<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>믿음의 예산안 - 수입 기록</title>
    <link rel="stylesheet" href="styles.css?v=9" />
  </head>
  <body>
    <main class="budget-app expense-page expense-entry-page income-entry-page">
      <header class="entry-page-header">
        <a class="home-link note-home-link" href="expense.html">홈</a>
        <div>
          <h1 class="note-title income-title">수입</h1>
        </div>
        <label class="month-control" for="budgetMonth">
          기록 월
          <input id="budgetMonth" type="month" />
        </label>
      </header>

      <section class="quick-entry note-entry" aria-labelledby="incomeEntryTitle">
        <h2 id="incomeEntryTitle" class="sr-only">수입 추가</h2>
        <form id="incomeForm" class="expense-form">
          <label>
            날짜
            <input id="incomeDate" type="date" required />
          </label>
          <label>
            금액
            <input id="incomeAmount" type="number" min="0" inputmode="numeric" placeholder="예: 500000" required />
          </label>
          <label class="memo-field">
            메모
            <input id="incomeMemo" type="text" placeholder="예: 월급, 용돈, 환급" />
          </label>
          <button id="submitIncomeButton" type="submit">수입 추가</button>
        </form>
      </section>

      <section class="summary-panel compact-summary" aria-label="월간 수입 요약">
        <div class="summary-card">
          <span>예정 수입</span>
          <strong id="plannedIncomeText">0원</strong>
        </div>
        <div class="summary-card">
          <span>기록한 수입</span>
          <strong id="recordedIncomeText">0원</strong>
        </div>
        <div class="summary-card balance">
          <span>총 수입</span>
          <strong id="totalIncomeText">0원</strong>
        </div>
      </section>

      <section class="expense-log note-log" aria-labelledby="incomeLogTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">기록</p>
            <h2 id="incomeLogTitle">최근 수입</h2>
          </div>
          <strong id="incomeCountText">0건</strong>
        </div>
        <div id="incomeList" class="expense-list"></div>
      </section>

      <section class="mobile-status-panel" aria-label="저장 상태">
        <p id="saveStatus" class="mobile-status" role="status">자동 저장됨</p>
      </section>
      <input id="sheetUrlInput" type="hidden" />
      <button id="saveSheetUrlButton" class="hidden-control" type="button">저장</button>
    </main>

    <script src="shared.js?v=9"></script>
    <script src="income.js?v=9"></script>
  </body>
</html>
